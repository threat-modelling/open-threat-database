name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true
        type: string
      publish_npm:
        description: 'Publish the package to npm'
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Determine release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="v$(jq -r .version package.json)"
          fi
          echo "name=$tag" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: '20'
          cache: 'npm'

      - if: steps.check.outputs.exists == 'false'
        run: npm ci

      - if: steps.check.outputs.exists == 'false'
        run: npm test

      - if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Upgrade npm for trusted publishing
        if: steps.check.outputs.exists == 'false' && (github.event_name == 'push' || inputs.publish_npm)
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false' && (github.event_name == 'push' || inputs.publish_npm)
        run: npm publish --provenance --access public

      - name: Create tag from package.json version
        if: steps.check.outputs.exists == 'false' && github.event_name == 'push'
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --generate-notes \
            dist/threats.json \
            dist/schema.json
